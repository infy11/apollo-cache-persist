name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      # ✅ Run tests with coverage
      - name: Run tests
        run: yarn coverage

      # ✅ Ensure build works
      - name: Build package
        run: yarn build

      # ✅ Ensure only expected files are packed
      - name: Verify package contents
        run: npm pack --dry-run
